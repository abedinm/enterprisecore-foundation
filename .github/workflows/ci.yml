name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -v --tb=short

  frontend:
    name: Frontend build (vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest unit tests
        run: npm test

      - name: Type-check + build
        run: npm run build

  smoke:
    name: End-to-end smoke (real server)
    runs-on: ubuntu-latest
    needs: [backend]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Boot server in background
        run: |
          cp .env.example .env
          python run.py &
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:8000/api/v1/system/health > /dev/null; then
              echo "API ready after $((i*2))s"; break
            fi
            sleep 2
          done
      - name: Run smoke tests
        run: |
          python smoke_test.py
          python smoke_test_v2.py
